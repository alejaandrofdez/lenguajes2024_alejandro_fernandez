</head>
<body>
    
    <h1>Formulario de contacto</h1>
    <p>Escribenos y en breve nos pondremos en contacto contigo</p>
    <form action="/submit" method="POST">
        
        <fieldset>
            <label for="nombre">Nombre</label><br>
            <input type="text" id="nombre" value="nombre" required><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" value="email" required><br>

            <label for="nombre">Teléfono</label><br>
            <input type="text" id="Teléfono" value="Teléfono" required><br>

            <label for="web">Sitio web</label><br>
            <input type="url" id="web" value="web" required><br>

            <label for="asunto">Asunto</label><br>
            <input type="text" id="asunto" value="asunto" required><br>

            

            <input type="submit" value="submit">
        
        </fieldset>


    </form>
