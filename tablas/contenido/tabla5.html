<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla 5</title>
    <style>
        table {
            width: 200px;
            border-collapse: collapse;
            margin: 50px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 20px;
            text-align: center;
            font-size: 20px;
        }
        td {
            cursor: pointer;
        }
        input {
            width: 100%;
            text-align: right;
            font-size: 20px;
            padding: 10px;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">Calculadora</h2>

<table>
    <tr>
        <td colspan="5"></td>
    </tr>

    <tr>
        <td colspan="5"></td>
    </tr>

    <tr>
        <td>MC</td>
        <td>MR</td>
        <td>MS</td>
        <td>M+</td>
        <td>M-</td>
    </tr>

    <tr>
        <td></td>
        <td>CE</td>
        <td>C</td>
        <td></td>
        <td></td>
    </tr>

    <tr>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>/</td>
        <td>%</td>
    </tr>

    <tr>
        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>*</td>
        <td>1/x</td>
    </tr>

    <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>-</td>
        <td rowspan="2">=</td>
    </tr>

    <tr>
        <td colspan="2">0</td>
        <td>,</td>
        <td>+</td>
    </tr>

</table>


</body>
</html>
